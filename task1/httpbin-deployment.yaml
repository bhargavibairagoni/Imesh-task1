apiVersion: apps/v1
kind: Deployment

metadata:
  name: httpbin

spec:
  replicas: 2

  selector:
    matchLabels:
      app: httpbin

  template:

    metadata:
      labels:
        app: httpbin

    spec:

      containers:

      - name: httpbin

        image: kennethreitz/httpbin

        ports:
        - containerPort: 80

        resources:

          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "250m"
            memory: "256Mi"

        readinessProbe:

          httpGet:
            path: /
            port: 80

          initialDelaySeconds: 5
          periodSeconds: 5

        livenessProbe:

          httpGet:
            path: /
            port: 80

          initialDelaySeconds: 10
          periodSeconds: 10
